[package]
edition = "2021"
name = "rust-transformer"
version = "0.0.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3.8.3", features = ["napi10"] }
napi-derive = "3.5.2"
oxc_allocator = "0.122.0"
oxc_parser = "0.122.0"
oxc_ast = "0.122.0"
oxc_traverse = "0.122.0"
oxc_span = "0.122.0"
oxc_ast_visit = "0.122.0"
oxc_codegen = "0.122.0"
oxc_semantic = "0.122.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
merge-source-map = "1.2.0"
sourcemap = "7.1.1"

[build-dependencies]
napi-build = "2.3.1"
