[package]
edition = "2024"
name = "rust-transformer"
version = "0.0.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3.8.3", features = ["napi10"] }
napi-derive = "3.5.2"
oxc_allocator = "0.122.0"
oxc_parser = "0.122.0"
oxc_ast = "0.122.0"
oxc_traverse = "0.122.0"
oxc_span = "0.122.0"
oxc_codegen = "0.122.0"
oxc_semantic = "0.122.0"
oxc_syntax = "0.122.0"
oxc_data_structures = { version = "0.122.0", features = ["rope"] }
rolldown_sourcemap = "0.1.0"
oxc_sourcemap = "6.1.1"

[build-dependencies]
napi-build = "2.3.1"
