[package]
edition = "2021"
name = "rust-transformer"
version = "0.0.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2.16.14", default-features = false, features = ["napi4"] }
napi-derive = "2.16.12"
oxc_allocator = "0.121.0"
oxc_parser = "0.121.0"
oxc_ast = "0.121.0"
oxc_traverse = "0.121.0"
oxc_span = "0.121.0"
oxc_ast_visit = "0.121.0"

[build-dependencies]
napi-build = "2.1.3"

[profile.release]
lto = true
